name: Generate contribution snake

on:
  schedule:
    # Refresh daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snakes
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/activity/github-snake.svg?color_snake=#c8ff00&color_dots=#0a0a0a,#1f2e12,#3f5c1c,#7a9e28,#c8ff00
            assets/activity/github-snake-dark.svg?palette=github-dark&color_snake=#c8ff00
            assets/activity/github-snake.gif?color_snake=#c8ff00&color_dots=#0a0a0a,#1f2e12,#3f5c1c,#7a9e28,#c8ff00&color_background=#0a0a0a

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity/github-snake.svg assets/activity/github-snake-dark.svg assets/activity/github-snake.gif || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: refresh contribution snake animation"
            git push
          fi
