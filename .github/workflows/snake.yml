name: Generate contribution snake

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

concurrency:
  group: snake-animation
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Emit GIF only — autoplays in profile README without a play control.
      # (SVG animation is less reliable across GitHub's image proxy.)
      - name: Generate snake GIF
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/activity/github-snake.gif?color_snake=#818cf8&color_dots=#0b0f19,#1e1b4b,#3730a3,#6366f1,#a78bfa&color_background=#0b0f19

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity/github-snake.gif
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh contribution snake gif"
          git pull --rebase origin main
          git push
