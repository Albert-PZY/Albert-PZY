<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Project showcase board</title>
  <desc id="desc">Six highlighted projects: typora-web, VidGnost, BiliSub, codex-relay, motion-reel, and mcp-tutorial.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#161616" stroke-width="0.8"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="28" fill="#0a0a0a"/>
  <rect width="1200" height="520" rx="28" fill="url(#grid)" opacity="0.55"/>

  <!-- card helper: 3x2 -->
  <!-- row 1 -->
  <g transform="translate(36 36)">
    <rect width="360" height="210" rx="18" fill="#111" stroke="#222"/>
    <rect x="0" y="0" width="360" height="8" rx="4" fill="#d97706"/>
    <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#f5f5f5">typora-web</text>
    <text x="24" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#d97706">ProseMirror · Markdown</text>
    <text x="24" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">高保真 Typora 风格 Web 编辑器</text>
    <text x="24" y="146" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">源码 / 所见即所得双向映射</text>
    <text x="24" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#737373">TypeScript · CM6 · KaTeX</text>
  </g>

  <g transform="translate(420 36)">
    <rect width="360" height="210" rx="18" fill="#111" stroke="#222"/>
    <rect x="0" y="0" width="360" height="8" rx="4" fill="#2563eb"/>
    <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#f5f5f5">VidGnost</text>
    <text x="24" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#60a5fa">Local AI · RAG</text>
    <text x="24" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">本地优先视频知识库</text>
    <text x="24" y="146" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">ASR + 时间戳精准问答</text>
    <text x="24" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#737373">Electron · Fastify · LanceDB</text>
  </g>

  <g transform="translate(804 36)">
    <rect width="360" height="210" rx="18" fill="#111" stroke="#222"/>
    <rect x="0" y="0" width="360" height="8" rx="4" fill="#0d9488"/>
    <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#f5f5f5">BiliSub</text>
    <text x="24" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#2dd4bf">Streaming · Subtitles</text>
    <text x="24" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">B 站字幕流式转写校对</text>
    <text x="24" y="146" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">NDJSON / SSE 实时编辑</text>
    <text x="24" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#737373">Next.js · React 19 · Vercel</text>
  </g>

  <!-- row 2 -->
  <g transform="translate(36 274)">
    <rect width="360" height="210" rx="18" fill="#111" stroke="#222"/>
    <rect x="0" y="0" width="360" height="8" rx="4" fill="#c8ff00"/>
    <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#f5f5f5">codex-relay</text>
    <text x="24" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#c8ff00">CLI · Session Resume</text>
    <text x="24" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">智能 Codex 号池切换</text>
    <text x="24" y="146" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">额度耗尽时无缝恢复上下文</text>
    <text x="24" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#737373">TypeScript · node-pty</text>
  </g>

  <g transform="translate(420 274)">
    <rect width="360" height="210" rx="18" fill="#111" stroke="#222"/>
    <rect x="0" y="0" width="360" height="8" rx="4" fill="#a855f7"/>
    <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#f5f5f5">motion-reel</text>
    <text x="24" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#c084fc">Remotion · TTS</text>
    <text x="24" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">项目宣传短片自动生成</text>
    <text x="24" y="146" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">大纲 → 旁白 → 成片流水线</text>
    <text x="24" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#737373">Python · Remotion · AI VO</text>
  </g>

  <g transform="translate(804 274)">
    <rect width="360" height="210" rx="18" fill="#111" stroke="#222"/>
    <rect x="0" y="0" width="360" height="8" rx="4" fill="#7dd3fc"/>
    <text x="24" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#f5f5f5">mcp-tutorial</text>
    <text x="24" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#7dd3fc">MCP · Protocols</text>
    <text x="24" y="120" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">最小可运行 MCP 示例</text>
    <text x="24" y="146" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="16" fill="#a3a3a3">stdio / SSE / streamable</text>
    <text x="24" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#737373">Python · MCP</text>
  </g>
</svg>
