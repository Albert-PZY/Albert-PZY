<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Albert-PZY · Full-stack &amp; AI Engineer</title>
  <desc id="desc">Albert builds TypeScript and Python systems around RAG, agents, editors, and local-first AI tooling.</desc>
  <defs>
    <linearGradient id="gLime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="gPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="glow" cx="82%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#c8ff00" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#7dd3fc" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" rx="28" fill="#0a0a0a"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.7"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>

  <!-- corner ticks -->
  <g stroke="#c8ff00" stroke-width="1.5" opacity="0.45" fill="none">
    <path d="M36 72 h22 M36 72 v18"/>
    <path d="M1164 288 h-22 M1164 288 v-18"/>
  </g>

  <!-- left identity -->
  <g transform="translate(56 52)">
    <rect x="0" y="0" width="118" height="28" rx="8" fill="#141414" stroke="#2a2a2a"/>
    <circle cx="16" cy="14" r="5" fill="#c8ff00"/>
    <text x="30" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#c8ff00">OPEN TO WORK</text>

    <text x="0" y="86" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="58" font-weight="800" fill="#f5f5f5">Albert</text>
    <text x="0" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7dd3fc">@Albert-PZY</text>

    <text x="0" y="178" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="24" font-weight="600" fill="#e5e5e5">全栈与 AI 应用开发工程师</text>
    <text x="0" y="214" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="18" fill="#a3a3a3">TypeScript / Python · RAG &amp; Agent · Electron / Next.js</text>
    <text x="0" y="246" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif" font-size="18" fill="#a3a3a3">交付类型安全、架构清晰的高可用系统</text>

    <rect x="0" y="270" width="72" height="5" rx="2.5" fill="url(#gLime)"/>
  </g>

  <!-- right proof panel: pipeline map -->
  <g transform="translate(700 48)">
    <rect width="444" height="264" rx="20" fill="url(#gPanel)" stroke="#222"/>
    <text x="28" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#737373">// focus map</text>

    <!-- nodes -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <rect x="28" y="64" width="120" height="42" rx="10" fill="#141414" stroke="#c8ff00" stroke-opacity="0.55"/>
      <text x="48" y="90" fill="#c8ff00">RAG</text>

      <rect x="172" y="64" width="120" height="42" rx="10" fill="#141414" stroke="#7dd3fc" stroke-opacity="0.55"/>
      <text x="192" y="90" fill="#7dd3fc">Agent</text>

      <rect x="316" y="64" width="100" height="42" rx="10" fill="#141414" stroke="#a3a3a3" stroke-opacity="0.55"/>
      <text x="336" y="90" fill="#e5e5e5">ASR</text>

      <rect x="28" y="130" width="160" height="42" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <text x="44" y="156" fill="#d4d4d4">ProseMirror</text>

      <rect x="208" y="130" width="208" height="42" rx="10" fill="#141414" stroke="#2a2a2a"/>
      <text x="224" y="156" fill="#d4d4d4">SSE / MCP / CLI</text>

      <rect x="28" y="196" width="388" height="42" rx="10" fill="#101810" stroke="#c8ff00" stroke-opacity="0.35"/>
      <text x="44" y="222" fill="#e5e5e5">Local-first · Full-stack delivery</text>
    </g>

    <!-- connectors -->
    <g stroke="#3f3f3f" stroke-width="1.4" fill="none" opacity="0.9">
      <path d="M88 106 v24"/>
      <path d="M232 106 v24"/>
      <path d="M366 106 v24"/>
      <path d="M108 172 v24"/>
      <path d="M312 172 v24"/>
    </g>
  </g>
</svg>
